name: Release conformance package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate fixtures
        run: npm run conformance:generate

      - name: Package conformance suite
        run: npm run conformance:package

      - name: Get version from tag
        id: version
        run: echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          TARBALL="tasknotes-conformance-${TAG#v}.tar.gz"

          gh release create "$TAG" \
            --title "tasknotes-spec $TAG" \
            --notes "$(cat <<'EOF'
          ## Conformance suite ${{ steps.version.outputs.TAG }}

          Download the tarball to run the conformance suite against any tasknotes implementation.

          ### Contents

          - `fixtures/*.json` — all fixture cases (JSON arrays)
          - `manifest.json` — fixture file index and case counts
          - `docs/FIXTURE_FORMAT.md` — fixture format and assertion reference
          - `docs/ADAPTER_CONTRACT.md` — adapter interface specification
          - `docs/RUNNER_GUIDE.md` — guide to implementing a runner in any language
          - `lib/matchers.mjs` — reference JS matcher implementation
          - `tests/runner.test.mjs` — reference JS runner

          ### Quick start (any language)

          See `docs/RUNNER_GUIDE.md` inside the tarball for a complete guide to implementing a runner.

          ### Quick start (JavaScript)

          ```bash
          tar xzf $TARBALL
          TASKNOTES_ADAPTER=./my-adapter.mjs node --test tests/runner.test.mjs
          ```
          EOF
          )" \
            "$TARBALL"
